services:
  - type: web
    name: trackflow-backend
    env: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"  # ← Pin to 3.12 (has pre-built pydantic-core wheels)
      - key: DATABASE_URL
        value: sqlite:///./data/trackflow.db
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: sqlite-data
      mountPath: /app/backend/data
      sizeGB: 1