services:
  - type: web
    name: trackflow-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./data/trackflow.db
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /health
    disk:
      name: backend-data
      mountPath: /app/data
      sizeGB: 1

  - type: web
    name: trackflow-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_API_BASE_URL
        value: /api